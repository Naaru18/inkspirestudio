<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inkspire Studio Login</title>
  <link rel="icon" type="image/png" href="../Images/logo.png">
  
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <link rel="stylesheet" href="login.css">
  
</head>
<body>

<button id="rtlToggle" class="rtl-toggle">RTL</button>

<button id="themeToggle" class="theme-toggle">
  <i class="fa-solid fa-moon"></i>
</button>

<div class="auth-box">

<a href="index.html" class="logo">
  
  <span class="logo-text">Inkspire Studio</span>
</a>

<h2 class="auth-title">Login</h2>

<form id="loginForm">

<input type="email" placeholder="Email" class="input" id="email">
<div class="error" id="emailError">Enter valid email</div>

<div class="input-group">
  <input type="password" placeholder="Password" class="input" id="password">
  <i class="fa-solid fa-eye toggle-pass" id="eye"></i>
</div>
<div class="error" id="passError">Password required</div>


<div class="options">
  <label><input type="checkbox"> Remember Me</label>
  <a href="#">Forgot Password?</a>
</div>

<button class="btn">Login</button>

</form>

<div class="social-row">
  <button class="social-btn"><i class="fab fa-google"></i></button>
  <button class="social-btn"><i class="fab fa-apple"></i></button>
  <button class="social-btn"><i class="fab fa-facebook-f"></i></button>
</div>

<div class="auth-link">
  Don’t have an account? <a href="signup.html">Signup</a>
</div>

</div>

<script>


loginForm.addEventListener("submit", function(e){
  e.preventDefault();

  let valid = true;

  if(!email.value.includes("@")){
    emailError.style.display="block";
    valid=false;
  } else emailError.style.display="none";

  if(password.value===""){
    passError.style.display="block";
    valid=false;
  } else passError.style.display="none";

  if(valid) alert("Login Successful!");
});


eye.onclick = () => {
  password.type = password.type === "password" ? "text" : "password";
};


themeToggle.onclick = () => {
  document.body.classList.toggle("light-mode");
  themeToggle.querySelector("i").classList.toggle("fa-sun");
};


rtlToggle.onclick = () => {
  document.body.classList.toggle("rtl");
};

</script>


</body>
</html>
