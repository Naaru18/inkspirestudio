<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> Inkspire Studio Register</title>
<link rel="icon" type="image/png" href="../Images/logo.png">
  
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <link rel="stylesheet" href="signup.css"> 
</head>
<body>

<div class="bg">
  <span></span>
  <span></span>
</div>

<button id="rtlToggle" class="rtl-toggle">RTL</button>

<button id="themeToggle" class="theme-toggle">
  <i class="fa-solid fa-moon"></i>
</button>

<div class="auth-box">

<a href="index.html" class="logo">
  <span class="logo-text">Inkspire Studio</span>
</a>

<h2 class="auth-title">Create Account</h2>

<form id="signupForm">

<input type="text" placeholder="Full Name" class="input" id="name">
<div class="error" id="nameError">Enter name</div>

<input type="email" placeholder="Email" class="input" id="email">
<div class="error" id="emailError">Enter valid email</div>

<div class="input-group">
  <input type="password" placeholder="Password" class="input" id="password">
  <i class="fa-solid fa-eye toggle-pass" id="eye1"></i>
</div>

<div class="input-group">
  <input type="password" placeholder="Confirm Password" class="input" id="confirm">
  <i class="fa-solid fa-eye toggle-pass" id="eye2"></i>
</div>
<div class="error" id="passError">Passwords do not match</div>

<button class="btn">Sign Up</button>

</form>

<div class="social-row">
  <button class="social-btn"><i class="fab fa-google"></i></button>
  <button class="social-btn"><i class="fab fa-apple"></i></button>
  <button class="social-btn"><i class="fab fa-facebook-f"></i></button>
</div>

<div class="auth-link">
  Already have an account? <a href="login.html">Login</a>
</div>

</div>

<script>


document.getElementById("signupForm").addEventListener("submit", function(e){
  e.preventDefault();

  let name = document.getElementById("name");
  let email = document.getElementById("email");
  let pass = document.getElementById("password");
  let confirm = document.getElementById("confirm");

  let valid = true;

  if(name.value===""){ nameError.style.display="block"; valid=false;}
  else nameError.style.display="none";

  if(!email.value.includes("@")){ emailError.style.display="block"; valid=false;}
  else emailError.style.display="none";

  if(pass.value !== confirm.value){
    passError.style.display="block";
    valid=false;
  } else passError.style.display="none";

  if(valid) alert("Signup Successful!");
});


function toggle(id,eyeId){
  const input = document.getElementById(id);
  const eye = document.getElementById(eyeId);

  eye.onclick = () => {
    input.type = input.type === "password" ? "text" : "password";
  }
}

toggle("password","eye1");
toggle("confirm","eye2");


themeToggle.onclick = () => {
  document.body.classList.toggle("light-mode");
  themeToggle.querySelector("i").classList.toggle("fa-sun");
};


rtlToggle.onclick = () => {
  document.body.classList.toggle("rtl");
};

</script>


</body>
</html>
